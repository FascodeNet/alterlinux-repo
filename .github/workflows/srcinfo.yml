name: Check .SRCINFO

on:
  pull_request:
    paths: ["alterlinux/**", "alterlinux-nostalgia/**"]
  push:
    branches: [master]
    paths: ["alterlinux/**", "alterlinux-nostalgia/**"]

permissions:
  contents: read

# alterlinux-aur is excluded: its packages are upstream AUR submodules whose
# .SRCINFO is maintained there.
jobs:
  srcinfo:
    uses: Hayao0819/Kamisato/.github/workflows/srcinfo-check.yml@636e0d4ba17cb103c19817dd5a60dce05838fd26 # master
    with:
      repos: alterlinux alterlinux-nostalgia
      version: 636e0d4ba17cb103c19817dd5a60dce05838fd26
