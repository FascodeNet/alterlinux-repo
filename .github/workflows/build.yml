name: Build and publish

on:
  push:
    branches: [master]
    paths: ["alterlinux/**"]
  workflow_dispatch:
    inputs:
      packages:
        description: "Force-build these packages (space-separated). Empty = build only packages newer than ayato."
        required: false
        default: ""
      all:
        description: "Force-rebuild every package regardless of version (recovery/rebuild; normal first run needs nothing here)."
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.x"
      - uses: Hayao0819/Kamisato/actions/install@master
        with:
          ayaka: "true"
          version: master
      - name: Build packages
        id: build
        env:
          API_SERVER: ${{ vars.AYATO_URL }}
          REPO_URL: ${{ vars.AYATO_REPO_URL }}
          PACKAGES: ${{ github.event.inputs.packages }}
          ALL: ${{ github.event.inputs.all }}
        run: |
          # --diff compares local pkgver against the remote pacman db, so it needs
          # the db directory URL (.../repo/<repo>/<arch>), not the API base used for
          # uploads. Fall back to the standard ayato route when the var is unset.
          diff_server="${REPO_URL:-${API_SERVER%/}/repo/alterlinux/x86_64}"
          if [ "$ALL" = "true" ]; then
            ayaka build alterlinux --executor container
          elif [ -n "$PACKAGES" ]; then
            ayaka build alterlinux $PACKAGES --executor container
          else
            ayaka build alterlinux --diff --executor container --server "$diff_server"
          fi
          if [ -n "$(find out/alterlinux -name '*.pkg.tar.*' -print -quit 2>/dev/null)" ]; then
            echo "built=true" >>"$GITHUB_OUTPUT"
          else
            echo "built=false" >>"$GITHUB_OUTPUT"
            echo "No packages needed building."
          fi
      - name: Upload to ayato
        if: steps.build.outputs.built == 'true'
        uses: Hayao0819/Kamisato/actions/upload@master
        with:
          server: ${{ vars.AYATO_URL }}
          repo: alterlinux
          files: out/alterlinux/**/*.pkg.tar.*
          api_key: ${{ secrets.AYATO_TOKEN }}
