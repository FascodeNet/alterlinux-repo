name: Build and publish

on:
  push:
    branches: [master]
    paths: ["alterlinux/**", "alterlinux-aur/**", "alterlinux-nostalgia/**"]
  workflow_dispatch:
    inputs:
      packages:
        description: "Force-build these packages (space-separated). Empty = build only packages newer than ayato."
        required: false
        default: ""
      all:
        description: "Force-rebuild every package regardless of version (recovery/rebuild; normal first run needs nothing here)."
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  # Build the {repo, arch} matrix from each repo's repo.json build.arches
  # (defaulting to x86_64), so a repo declares its own architectures.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          entries='[]'
          for dir in $(jq -r '.repos[].dir' .ayakarc.json); do
            rj="$dir/repo.json"
            [ -f "$rj" ] || continue
            name=$(jq -r '.name' "$rj")
            for arch in $(jq -r '(.build.arches // ["x86_64"])[]' "$rj"); do
              entries=$(jq -cn --argjson e "$entries" --arg r "$name" --arg a "$arch" '$e + [{repo: $r, arch: $a}]')
            done
          done
          echo "matrix={\"include\":$entries}" >>"$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-go@v6
        with:
          go-version: "1.x"
          cache: false
      - uses: Hayao0819/Kamisato/actions/install@master
        with:
          ayaka: "true"
          version: master
      - name: Build packages
        id: build
        env:
          API_SERVER: ${{ vars.AYATO_URL }}
          PACKAGES: ${{ github.event.inputs.packages }}
          ALL: ${{ github.event.inputs.all }}
          REPO: ${{ matrix.repo }}
          ARCH: ${{ matrix.arch }}
        run: |
          # --diff compares local pkgver against the remote pacman db, so it needs
          # the db directory URL (.../repo/<repo>/<arch>), derived per repo/arch.
          diff_server="${API_SERVER%/}/repo/$REPO/$ARCH"
          if [ "$ALL" = "true" ]; then
            ayaka build "$REPO" --arch "$ARCH" --executor container
          elif [ -n "$PACKAGES" ]; then
            ayaka build "$REPO" $PACKAGES --arch "$ARCH" --executor container
          else
            ayaka build "$REPO" --diff --arch "$ARCH" --executor container --server "$diff_server"
          fi
          if [ -n "$(find "out/$REPO" -name '*.pkg.tar.*' -print -quit 2>/dev/null)" ]; then
            echo "built=true" >>"$GITHUB_OUTPUT"
          else
            echo "built=false" >>"$GITHUB_OUTPUT"
            echo "No packages needed building."
          fi
      - name: Upload to ayato
        if: steps.build.outputs.built == 'true'
        uses: Hayao0819/Kamisato/actions/upload@master
        with:
          server: ${{ vars.AYATO_URL }}
          repo: ${{ matrix.repo }}
          files: out/${{ matrix.repo }}/**/*.pkg.tar.*
          api_key: ${{ secrets.AYATO_TOKEN }}
