# Reclaim dentry/inode cache aggressively; a 128 MB box cannot afford to hoard it.
vm.vfs_cache_pressure = 200
# Flush dirty pages early so little RAM is pinned as write-back.
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
# With zram swap, prefer it over dropping caches (raise to 180 if zram is on).
vm.swappiness = 100
